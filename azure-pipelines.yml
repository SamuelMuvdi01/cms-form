trigger:
  branches:
    include:
      - main

variables:
  acrName: '<YOUR_ACR_NAME>'
  acrLoginServer: '$(acrName).azurecr.io'
  imageName: 'cms-form'
  imageTag: '$(Build.BuildId)'
  appServiceName: '<YOUR_APP_SERVICE_NAME>'

stages:

  - stage: Build
    displayName: Build and Push Image
    jobs:
      - job: BuildAndPush
        displayName: Docker build and push to ACR
        pool:
          vmImage: ubuntu-latest
        steps:
          - task: Docker@2
            displayName: Build and push to ACR
            inputs:
              command: buildAndPush
              repository: $(imageName)
              dockerfile: Dockerfile
              containerRegistry: '<YOUR_ACR_SERVICE_CONNECTION>'
              tags: |
                $(imageTag)
                latest

  - stage: Deploy
    displayName: Deploy to App Service
    dependsOn: Build
    jobs:
      - deployment: DeployContainer
        displayName: Deploy container image
        environment: production
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: Deploy to Azure App Service
                  inputs:
                    azureSubscription: '<YOUR_AZURE_SERVICE_CONNECTION>'
                    appName: $(appServiceName)
                    containers: $(acrLoginServer)/$(imageName):$(imageTag)
